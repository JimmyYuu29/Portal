<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar Contraseña - Portal Forvis Mazars</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <i data-lucide="key-round"></i>
                </div>
                <h1>Cambiar Contraseña</h1>
                <p>Actualiza tu contraseña actual</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <div class="flash-messages">
                {% for category, message in messages %}
                <div class="flash flash-{{ category }}">
                    <span>{{ message }}</span>
                </div>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}

            <form method="POST" class="auth-form" id="change-pw-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="form-group">
                    <label for="old_password">
                        <i data-lucide="lock"></i>
                        Contraseña actual
                    </label>
                    <input type="password" id="old_password" name="old_password" required
                        placeholder="Tu contraseña actual" autocomplete="current-password">
                </div>

                <div class="form-group">
                    <label for="new_password">
                        <i data-lucide="lock"></i>
                        Nueva contraseña
                    </label>
                    <input type="password" id="new_password" name="new_password" required
                        placeholder="Mínimo 6 caracteres" autocomplete="new-password" minlength="6">
                </div>

                <div class="form-group">
                    <label for="new_password2">
                        <i data-lucide="lock"></i>
                        Confirmar nueva contraseña
                    </label>
                    <input type="password" id="new_password2" name="new_password2" required
                        placeholder="Repite la nueva contraseña" autocomplete="new-password">
                </div>

                <button type="submit" class="btn btn-primary btn-block" id="change-pw-btn">
                    <i data-lucide="check-circle"></i>
                    Cambiar Contraseña
                </button>
            </form>

            <div class="auth-links">
                <a href="{{ url_for('dashboard') }}" class="auth-link">
                    <i data-lucide="arrow-left"></i>
                    Volver al Dashboard
                </a>
            </div>
        </div>

        <div class="auth-footer">
            <p><i data-lucide="shield"></i> Portal de Herramientas de Automatización Interna</p>
        </div>
    </div>

    <script>lucide.createIcons();</script>
</body>

</html>
